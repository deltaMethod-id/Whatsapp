<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WhatsApp-like Chat (Demo)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <div class="avatar">WA</div>
        <div class="title">Chat Demo</div>
      </div>
      <div class="header-right">
        <button id="changeNameBtn" class="btn">Ubah nama</button>
      </div>
    </header>

    <main id="chat" class="chat"></main>

    <form id="composer" class="composer">
      <input id="inputMessage" type="text" placeholder="Ketik pesan..." autocomplete="off" />
      <button type="submit" class="send">Kirim</button>
    </form>
  </div>

  <!-- Username modal -->
  <div id="nameModal" class="modal hidden">
    <div class="modal-content">
      <h2>Masukkan username</h2>
      <input id="usernameInput" type="text" placeholder="Nama panggilan" />
      <div class="modal-actions">
        <button id="saveNameBtn" class="btn primary">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Supabase JS (v2) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
